<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alfaham TV</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    overflow-x: hidden;
}

body {
    font-family: 'Cairo', sans-serif;
    background: url('https://c.top4top.io/p_36090k7by0.png') center / cover no-repeat fixed;
    min-height: 100vh;
    margin: 0;
}

.site-header {
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    z-index: 100000;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    background: rgba(0, 0, 0, 0.78);
    backdrop-filter: blur(14px);
    color: #fff;
}

.site-title {
    font-weight: 700;
    font-size: 18px;
    text-align: center;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    max-width: 60%;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sidebar-toggle,
.nav-item,
.sidebar-close,
.install-btn {
    border: none;
    background: transparent;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
}

.sidebar-toggle {
    font-size: 22px;
    width: 42px;
    height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.install-btn {
    min-width: 88px;
    padding: 8px 12px;
    border: 1px solid rgba(255, 255, 255, 0.32);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    transition: background 0.2s ease, transform 0.2s ease;
}

.install-btn:hover {
    background: rgba(255, 255, 255, 0.18);
    transform: translateY(-1px);
}

.site-logo {
    height: 48px;
    width: auto;
    object-fit: contain;
    display: flex;
    align-items: center;
    justify-content: center;
}

.sidebar-overlay {
    position: fixed;
    top: 64px;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.45);
    z-index: 99998;
    display: none;
}

.toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: transparent;
    color: #ffffff;
    padding: 0;
    border-radius: 0;
    font-weight: 700;
    z-index: 100001;
    box-shadow: none;
    max-width: calc(100% - 32px);
    text-align: center;
    pointer-events: none;
}

.card.message-card {
    background: rgba(255, 255, 255, 0.12);
    color: #ffffff;
    box-shadow: none;
    border: 1px solid rgba(255, 255, 255, 0.08);
}

.hidden {
    display: none !important;
}

.sidebar-overlay.hidden {
    display: none;
}

.sidebar {
    position: fixed;
    top: 64px;
    left: 0;
    height: calc(100vh - 64px);
    width: 280px;
    max-width: 85vw;
    background: rgba(0, 0, 0, 0.98);
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 1000001; /* رفع القيمة لتكون أعلى من الشريط السفلي (100000) */
    padding: 22px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto; /* تفعيل التمرير العمودي */
    scrollbar-width: thin; /* لمتصفحات فايرفوكس */
    scrollbar-color: var(--primary) transparent;
}

/* تخصيص شكل شريط التمرير لمتصفحات كروم وويب كيت */
.sidebar::-webkit-scrollbar {
    width: 4px;
}

.sidebar::-webkit-scrollbar-track {
    background: transparent;
}

.sidebar::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
}

.sidebar-open .sidebar {
    transform: translateX(0);
}

.sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

.sidebar-title {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
}

.sidebar-close {
    border: none;
    background: transparent;
    color: #fff;
    font-size: 26px;
    cursor: pointer;
    line-height: 1;
}

.sidebar-open .sidebar-overlay {
    display: block;
}

.sidebar-brand {
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.sidebar-logo {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    object-fit: cover;
    display: flex;
    align-items: center;
    justify-content: center;
}

.sidebar-name {
    font-size: 18px;
    font-weight: 800;
    margin-top: 15px;
    color: var(--primary);
}

.sidebar-section {
    padding: 0 20px 20px;
}

.sidebar-section-title {
    font-size: 12px;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-bottom: 15px;
    font-weight: 700;
}

.sidebar-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 15px;
    color: #ffffff; /* اللون الأبيض الأساسي للروابط */
    text-decoration: none;
    border-radius: 12px;
    transition: all 0.3s ease;
    margin-bottom: 5px;
    font-size: 14px;
    font-weight: 700;
}

.sidebar-link i {
    width: 20px;
    text-align: center;
    font-size: 18px;
    color: #ffffff; /* الأيقونات باللون الأبيض أيضاً */
    transition: all 0.3s ease;
}

.sidebar-link:hover,
.sidebar-link:active {
    background: rgba(255, 102, 0, 0.15); /* خلفية برتقالية خفيفة عند المرور */
    color: #FF6600; /* يتغير النص للبرتقالي عند المرور أو الضغط */
}

.sidebar-link:hover i,
.sidebar-link:active i {
    color: #FF6600; /* تتغير الأيقونة للبرتقالي عند المرور أو الضغط */
}

.bottom-nav {
    position: fixed;
    inset: auto 0 0 0;
    z-index: 100000;
    display: flex;
    justify-content: center;
    align-items: stretch;
    height: 64px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    gap: 0;
}

.nav-item {
    color: #ffffff; /* النص باللون الأبيض عند عدم الاختيار */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0;
    border-radius: 0;
    flex: 1;
    transition: all 0.3s ease;
    height: 100%;
    opacity: 0.6; /* شفافية بسيطة لغير المختار لزيادة التركيز على المختار */
    font-weight: 700;
    font-size: 13px;
}

.nav-item.active {
    background: #000000 !important;
    color: #ff8c00 !important; /* النص باللون البرتقالي عند الاختيار */
    opacity: 1;
    font-size: 14px;
}

.nav-item:hover {
    opacity: 0.8;
}

.nav-icon {
    font-size: 18px;
    color: #fff;
}

.content-container {
    width: min(100%, 1400px);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 94px 16px 100px;
    margin: 0 auto;
    overflow-y: auto;
}

.player-open .site-header,
.player-open .bottom-nav,
.player-open .sidebar,
.player-open .sidebar-overlay,
.player-open .content-container {
    display: none !important;
}

/* الشبكة */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 110px);
    gap: 8px;
    justify-content: center;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
}

/* الكرت */
.card {
    background-color: rgba(255, 255, 255, 0.92);
    border-radius: 8px;
    width: 110px;
    padding: 6px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.2s ease;
    cursor: pointer;
    border: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 8px;
}

.card-title {
    margin-top: 4px;
    font-size: clamp(11px, 1.5vw, 13px);
    color: #000;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
    text-align: center;
    font-weight: 700;
}

/* مشغل الفيديو النظيف */
.player-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding-bottom: 72px;
}

.player-container.hidden {
    display: none !important;
}

/* تنسيقات جدول المباريات المدمج */
.matches-table-container,
.external-link-container {
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 0;
    direction: rtl;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 100001;
    background: #000;
}

#matchesIframe,
#externalLinkIframe {
    width: 100%;
    height: 100%;
    background: #fff;
    border: none;
}

.external-link-toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    padding: 12px 18px;
    background: rgba(0, 0, 0, 0.92);
    color: #fff;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky;
    top: 0;
    z-index: 100002;
}

.external-link-title {
    font-weight: 700;
    font-size: 14px;
    color: #ffcc00;
}

.close-embed-btn {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 8px 14px;
    cursor: pointer;
    font-weight: 700;
}

.close-embed-btn:hover {
    background: rgba(255,255,255,0.15);
}

/* الأنماط الخاصة بالعناصر داخل الجدول المستخرج من الكود */
.mnajiri {
    display: block;
    height: 94px;
    position: relative;
    background: #fff;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    border-radius: 5px;
    margin: 12px auto;
    color: #333;
    text-decoration: none;
}

.mpart1 { position: relative; height: 48px; line-height: 48px; }
.mpart1 strong { color: #fff; height: 30px; line-height: 30px; position: absolute; left: 50%; transform: translateX(-50%); top: 10px; text-align: center; width: 80px; z-index: 1; border-radius: 5px; background: #222; font-size: 12px; }
.right_match { float: right; width: 50%; text-align: left; padding-left: 60px; line-height: 94px; font-weight: 700; }
.left_match { float: left; width: 50%; text-align: right; padding-right: 60px; line-height: 94px; font-weight: 700; }
.mnajiri img { width: 45px; height: 45px; position: absolute; top: 24px; padding: 2px; background: #fff; border-radius: 50%; border: 1px solid #eee; }
.right_match img { right: 10px; }
.left_match img { left: 10px; }
.details_match { position: absolute; bottom: 0; width: 100%; height: 30px; line-height: 30px; background: #eee; font-size: 11px; text-align: center; border-radius: 0 0 5px 5px; }
.details_match span { padding: 0 10px; }

#player-wrapper {
    flex: 1;
    width: 100%;
    min-height: 0;
    background: #000;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.player-engine-control {
    position: absolute;
    bottom: 0;
    left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px 16px;
    background: rgba(17, 17, 17, 0.95);
    border-top: 1px solid rgba(255,255,255,0.1);
    width: 100%;
    flex-shrink: 0;
    min-height: 50px;
    z-index: 1000002;
}

.player-engine-control label {
    color: #fff;
    font-weight: 700;
    font-size: 13px;
}

.player-engine-control select {
    padding: 8px 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: #000;
    color: #fff;
    font-size: 13px;
    min-width: 150px;
}

.video-js,
.native-video,
.playerjs-container,
#clappr-container,
#dplayer-container,
#openplayer-container,
#mediachrome-container,
#shaka-video,
#dashjs-video,
#plyr-video,
#mediaelement-video,
#jwplayer-container,
#flowplayer-container {
    width: 100% !important;
    height: 100% !important;
    max-width: 100% !important;
    max-height: 100% !important;
    object-fit: contain !important;
    margin: auto !important;
}

/* إصلاحات خاصة لبعض المشغلات التي تستخدم iframe أو containers معقدة */
.playerjs-container iframe,
#clappr-container .clappr-player,
#dplayer-container .dplayer-video-wrap,
#jwplayer-container .jwplayer,
#flowplayer-container .fp-player {
    width: 100% !important;
    height: 100% !important;
}

.video-js video {
    object-fit: contain !important;
}

.message-card {
    background: rgba(0, 0, 0, 0.4) !important;
    color: #fff !important;
    border: none !important;
    font-size: 13px;
    padding: 10px 20px !important;
    border-radius: 20px !important;
    width: auto !important;
    min-height: auto !important;
    box-shadow: none !important;
}

.native-video.hidden,
.playerjs-container.hidden,
.video-js.hidden,
#clappr-container.hidden,
#dplayer-container.hidden,
#openplayer-container.hidden,
#mediachrome-container.hidden,
#shaka-video.hidden,
#dashjs-video.hidden,
#plyr-video.hidden,
#mediaelement-video.hidden,
#jwplayer-container.hidden,
#flowplayer-container.hidden {
    display: none !important;
}

/* حاوية كروت المباريات */
.matches-grid {
    display: grid;
    grid-template-columns: 1fr; /* كرت واحد تحت الآخر في الموبايل بشكل افتراضي */
    gap: 20px;
    padding: 14px;
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
}

@media (min-width: 769px) {
    .matches-grid {
        grid-template-columns: 1fr 1fr; /* كرتين بجانب بعض في الشاشات الكبيرة */
    }
}

@media (max-width: 768px) {
    .content-container {
        padding: 84px 12px 100px;
    }

    .site-header {
        padding: 0 10px;
    }

    .sidebar {
        width: 90vw;
        max-width: 90vw;
    }

    .sidebar-section {
        padding: 16px;
    }

    .sidebar-brand {
        padding: 20px 16px;
    }

    .card {
        min-height: 130px;
        padding: 8px;
    }

    .install-btn {
        min-width: 72px;
        font-size: 12px;
        padding: 6px 10px;
    }
}

.match-card {
    text-decoration: none;
    display: block;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.3s ease;
    aspect-ratio: 1080 / 480; /* النسبة المطلوبة */
    width: 100%;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

.match-card:hover {
    transform: scale(1.04);
}

.match-card img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: fill; /* ملء الأبعاد تماماً 1080x480 */
    border-radius: 12px;
}

/* تخصيص شكل المشغل ليكون مثل ExoPlayer */
.empty-section-msg {
    grid-column: 1 / -1;
    text-align: center;
    color: rgba(255, 255, 255, 0.6);
    font-size: 14px;
    padding: 40px 20px;
    font-weight: 700;
}

.player-error-msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    z-index: 100002;
    pointer-events: none;
    text-align: center;
    white-space: nowrap;
}

.vjs-big-play-centered .vjs-big-play-button {
    background-color: rgba(56, 189, 248, 0.7);
    border-radius: 50%;
    width: 2em;
    height: 2em;
    line-height: 2em;
    margin-top: -1em;
    margin-left: -1em;
    border: none;
}

/* تنسيقات جدول المباريات المدمج */
.lightbox { display: flex; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); z-index: 999999; }
.lightbox-content { background: #fff; padding: 20px; border-radius: 10px; text-align: center; max-width: 400px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); direction: rtl; margin: 10px; }
.icon-alert { color: #ff5722; margin-bottom: 10px; }
.lightbox-content h2 { margin: 10px 0; color: #081828; font-size: 18px; }
.lightbox-content p { font-size: 16px; color: #555; margin-bottom: 20px; }
.button-group { display: flex; justify-content: space-between; gap: 10px; }
.btn-download, .btn-hide { padding: 10px 20px; border: none; border-radius: 5px; font-size: 14px; cursor: pointer; text-decoration: none; text-align: center; }
.btn-download { background-color: #007bff; color: #fff; }
.btn-download:hover { background-color: #0056b3; }
.btn-hide { background-color: #ccc; color: #333; }
.btn-hide:hover { background-color: #bbb; }

.match_today.container { width: 100%; max-width: 100%; padding: 0; background: transparent; }
#match_today h2 { background: #FF6600; color: #fff; text-align: center; padding: 10px; }
#clock { font-size: 0.6em; margin-top: 1px; }

.mnajiri { display: block; height: 94px; position: relative; background: rgb(245, 245, 245); box-shadow: rgba(0, 0, 0, 0.57) 0px 25px 20px -21px; border-radius: 5px; margin: 12px auto; color: #333; text-decoration: none; overflow: hidden; }
.mpart1 { position: relative; height: 48px; line-height: 48px; }
.mpart1 strong { color: #fff; height: 30px; line-height: 30px; position: absolute; left: 50%; transform: translateX(-50%); top: 10px; text-align: center; width: 80px; z-index: 1; border-radius: 5px; background: #222; font-size: 12px; }
.right_match { float: right; width: 50%; text-align: left; padding-left: 60px; line-height: 94px; font-weight: 700; color: #000; }
.left_match { float: left; width: 50%; text-align: right; padding-right: 60px; line-height: 94px; font-weight: 700; color: #000; }
.mnajiri img { width: 45px; height: 45px; position: absolute; top: 24px; padding: 2px; background: #fff; border-radius: 50%; border: 1px solid #eee; }
.right_match img { right: 10px; }
.left_match img { left: 10px; }
.details_match { position: absolute; bottom: 0; width: 100%; height: 30px; line-height: 30px; background: #eee; font-size: 11px; text-align: center; border-radius: 0 0 5px 5px; }
.details_match span { padding: 0 10px; background-color: #222222; color: #fff; border-left: 1px solid #fff; }

.vjs-control-bar {
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent) !important;
    height: 4em !important;
}

.vjs-button > .vjs-icon-placeholder:before {
    line-height: 2.5 !important;
}

/* إخفاء الهيدر القديم للمشغل لجعل التصميم نظيفاً */
.player-header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10001;
    display: none; /* مخفي لجعل المشغل نظيفاً تماماً */
}

/* أزرار الروابط - أعلى اليسار كما كانت */
.quality-buttons {
    position: absolute;
    top: 18px;
    left: 18px;
    z-index: 999999;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 8px;
    background: transparent;
    border-radius: 14px;
    backdrop-filter: none;
    direction: ltr;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.quality-buttons.show {
    opacity: 1;
    pointer-events: auto;
}

.quality-menu {
    position: absolute;
    right: 18px;
    top: 18px;
    z-index: 999999;
    width: auto;
    height: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.quality-menu.show {
    opacity: 1;
    pointer-events: auto;
}

.quality-option-list {
    position: absolute;
    right: 0;
    top: 56px;
    min-width: 130px;
    max-width: 240px;
    background: rgba(0, 0, 0, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(16px);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.vjs-quality-toggle-button {
    width: 38px;
    height: 38px;
    line-height: 38px;
    font-size: 18px;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 50%;
    color: #ffffff;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
}

.vjs-quality-toggle-button:hover {
    background: rgba(255, 255, 255, 0.15);
}

.vjs-quality-toggle-button .vjs-icon-placeholder {
    font-size: 18px;
    line-height: 1;
}

.quality-toggle {
    width: auto;
    height: auto;

(function(window) {
    class Playerjs {
        constructor(config) {
            if (!config || !config.id || !config.file) return;
            this.container = document.getElementById(config.id);
            this.events = {};
            this.hls = null;
            this.video = document.createElement('video');
            this.video.controls = true;
            this.video.playsInline = true;
            this.video.autoplay = !!config.autoplay;
            this.video.crossOrigin = 'anonymous';
            this.video.style.width = '100%';
            this.video.style.height = '100%';
            this.video.style.borderRadius = '12px';
            this.video.style.backgroundColor = '#000';
            if (this.container) {
                this.container.innerHTML = '';
                this.container.appendChild(this.video);
            }
            this.url = config.file;
            if (this.url && this.url.includes('.m3u8') && window.Hls && Hls.isSupported()) {
                this.hls = new Hls();
                this.hls.loadSource(this.url);
                this.hls.attachMedia(this.video);
                this.hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        this.emit('error', data);
                    }
                });
            } else if (this.url) {
                this.video.src = this.url;
            }
            this.video.addEventListener('error', () => {
                this.emit('error', { message: 'Video element error', code: this.video.error ? this.video.error.code : null });
            });
            if (this.video.autoplay) {
                this.video.play().catch(() => {});
            }
        }

        on(event, callback) {
            if (!this.events[event]) this.events[event] = [];
            this.events[event].push(callback);
        }

        emit(event, data) {
            if (!this.events[event]) return;
            this.events[event].forEach((callback) => {
                try {
                    callback(data);
                } catch (err) {
                    console.error('Playerjs event callback error:', err);
                }
            });
        }

        pause() {
            if (this.video && typeof this.video.pause === 'function') {
                this.video.pause();
            }
        }

        destroy() {
            if (this.hls && typeof this.hls.destroy === 'function') {
                this.hls.destroy();
                this.hls = null;
            }
            if (this.video) {
                try {
                    this.video.pause();
                } catch (err) {}
                if (this.video.parentNode) {
                    this.video.parentNode.removeChild(this.video);
                }
                this.video = null;
            }
            if (this.container) {
                this.container.innerHTML = '';
                this.container = null;
            }
            this.events = {};
        }
    }

    window.Playerjs = Playerjs;
})(window);

function fallbackToNextEngine(url) {
    // في حالة المحاولات المتوازاة، لا تنتقل للمشغل التالي إذا كان هناك مشغل ناجح
    if (parallelEngineSuccessful) return;
    
    for (let engine of FALLBACK_ORDER) {
        if (!attemptedFallbacks[engine]) {
            setPlayerSource(url, engine, false);
            return true;
        }
    }
    
    // إذا فشلت جميع المشغلات، انتقل للرابط التالي
    const engineSelect = $('playerEngineSelect');
    if (engineSelect) engineSelect.value = 'auto';
    return fallbackToNextLink();
}

function fallbackToNextLink() {
    if (!currentChannelLinks || currentChannelLinks.length <= 1) return false;
    const nextIndex = currentLinkIndex + 1;
    if (nextIndex >= currentChannelLinks.length) {
        showPlayerError('عذراً، جميع الروابط غير مدعومة');
        return false;
    }
    
    currentLinkIndex = nextIndex;
    currentQualityIndex = nextIndex;
    currentQualityMode = 'links';
    
    // إعادة تعيين محاولات المشغلات للرابط الجديد
    Object.keys(attemptedFallbacks).forEach(k => attemptedFallbacks[k] = false);
    parallelEngineSuccessful = false;
    
    // تحديث أزرار الروابط وتحديد الزر النشط
    setupQualityButtons(currentChannelLinks, 'links');
    document.querySelectorAll('.quality-button').forEach((btn, i) => {
        btn.classList.toggle('active', i === nextIndex);
    });
    
    // عرض رسالة تنبيه بسيطة
    toast(`جاري الانتقال للرابط التالي...`);
    
    // تجربة مشغلات متعددة بشكل موازاة للرابط الجديد (5 مشغلات)
    setTimeout(() => {
        tryEnginesInParallel(currentChannelLinks[nextIndex].url, 5);
    }, 300);
    
    return true;
}

let engineTimeoutHandle = null;
function tryEnginesInParallel(url, numEngines = 5) {
    if (!url) return;
    
    if (engineTimeoutHandle) clearTimeout(engineTimeoutHandle);
    parallelEngineAttempts = 0;
    parallelEngineSuccessful = false;
    Object.keys(attemptedFallbacks).forEach(k => attemptedFallbacks[k] = false);
    
    const enginesToTry = FALLBACK_ORDER.slice(0, numEngines);
    const startTimestamp = Date.now();
    
    enginesToTry.forEach((engine, idx) => {
        setTimeout(() => {
            if (!parallelEngineSuccessful) {
                parallelEngineAttempts++;
                setPlayerSource(url, engine, false);
            }
        }, idx * 200); // تأخير 200ms بين كل محاولة (أسرع من 500ms)
    });
    
    // إذا فشلت جميع المحاولات خلال 5 ثواني، انتقل للرابط التالي
    engineTimeoutHandle = setTimeout(() => {
        if (!parallelEngineSuccessful && parallelEngineAttempts >= numEngines) {
            fallbackToNextLink();
        }
    }, 5000);
}

        if ($('grid')) $('grid').classList.remove('hidden');
        if ($('matchesTableContainer')) $('matchesTableContainer').classList.add('hidden');
        if ($('externalLinkContainer')) $('externalLinkContainer').classList.add('hidden');
        if (homeNav) homeNav.classList.add('active');
        if (matchesNav) matchesNav.classList.remove('active');
        pushState();
        return;
    }

    if (event.state && Array.isArray(event.state.stack)) {
        currentStack = event.state.stack;
        currentChannelId = event.state.channelId || null;
        window.currentViewMode = event.state.viewMode || 'home';
        window.currentExternalUrl = event.state.externalUrl || '';
        applyViewMode();
        renderCurrentView();
        if (currentChannelId) {
            const channel = channelsCache.find(ch => ch.id === currentChannelId);
            if (channel) selectChannel(channel, false);
        }
        return;
    }

    const hashState = restoreHashState();
    currentStack = hashState.stack;
    currentChannelId = hashState.channelId;
    window.currentViewMode = hashState.viewMode;
    window.currentExternalUrl = hashState.externalUrl || '';
    applyViewMode();
    renderCurrentView();
    if (currentChannelId) {
        const channel = channelsCache.find(ch => ch.id === currentChannelId);
        if (channel) selectChannel(channel, false);
    }
});

function applyViewMode() {
    const homeNav = $('homeNav');
    const matchesNav = $('matchesNav');
    
    // إخفاء/إظهار المشغل بناءً على وجود قناة مختارة
    if (currentChannelId) {
        $('playerContainer').classList.remove('hidden');
        document.body.classList.add('player-open');
    } else {
        $('playerContainer').classList.add('hidden');
        document.body.classList.remove('player-open');
    }

    if (window.currentViewMode === 'matches') {
        if ($('grid')) $('grid').classList.add('hidden');
        if ($('matchesGrid')) $('matchesGrid').classList.remove('hidden');
        if ($('matchesTableContainer')) $('matchesTableContainer').classList.add('hidden');
        if ($('externalLinkContainer')) $('externalLinkContainer').classList.add('hidden');
        if (matchesNav) matchesNav.classList.add('active');
        if (homeNav) homeNav.classList.remove('active');
    } else if (window.currentViewMode === 'matchesTable') {
        if ($('grid')) $('grid').classList.add('hidden');
        if ($('matchesGrid')) $('matchesGrid').classList.add('hidden');
        if ($('matchesTableContainer')) $('matchesTableContainer').classList.remove('hidden');
        if ($('externalLinkContainer')) $('externalLinkContainer').classList.add('hidden');
        if (matchesNav) matchesNav.classList.add('active');
        if (homeNav) homeNav.classList.remove('active');
        loadMatchesTable();
    } else if (window.currentViewMode === 'externalLink') {
        if ($('grid')) $('grid').classList.add('hidden');
        if ($('matchesGrid')) $('matchesGrid').classList.add('hidden');
        if ($('matchesTableContainer')) $('matchesTableContainer').classList.add('hidden');
        if ($('externalLinkContainer')) {
            $('externalLinkContainer').classList.remove('hidden');
            if ($('externalLinkIframe')) $('externalLinkIframe').src = window.currentExternalUrl;
        }
        if (homeNav) homeNav.classList.add('active');
        if (matchesNav) matchesNav.classList.remove('active');
    } else {
        if ($('grid')) $('grid').classList.remove('hidden');
        if ($('matchesGrid')) $('matchesGrid').classList.add('hidden');
        if ($('matchesTableContainer')) $('matchesTableContainer').classList.add('hidden');
        if ($('externalLinkContainer')) $('externalLinkContainer').classList.add('hidden');
        if (homeNav) homeNav.classList.add('active');
        if (matchesNav) matchesNav.classList.remove('active');
    }
}

function serializeStack(stack) {
    return stack.filter(Boolean).join(',');
}

function buildHash(stack, channelId) {
    if (window.currentViewMode === 'matches') return 'matches';
    if (window.currentViewMode === 'matchesTable') return 'matchesTable';
    if (window.currentViewMode === 'externalLink' && window.currentExternalUrl) return `ext:${encodeURIComponent(window.currentExternalUrl)}`;
    const stackHash = serializeStack(stack);
    if (!stackHash && !channelId) return '';
    return channelId ? `${stackHash}|${channelId}` : stackHash;
}

function pushState() {
    const hash = buildHash(currentStack, currentChannelId);
    const url = `${window.location.pathname}${window.location.search}${hash ? `#${hash}` : ''}`;
    window.history.pushState({ 
        path: 'navigation', 
        stack: [...currentStack], 
        channelId: currentChannelId,
        viewMode: window.currentViewMode,
        externalUrl: window.currentExternalUrl 
    }, '', url);
}

function restoreHashState() {
    const raw = window.location.hash.slice(1);
    if (!raw) return { stack: [], channelId: null, viewMode: 'home', externalUrl: '' };
    if (raw === 'matches') return { stack: [], channelId: null, viewMode: 'matches', externalUrl: '' };
    if (raw === 'matchesTable') return { stack: [], channelId: null, viewMode: 'matchesTable', externalUrl: '' };
    if (raw.startsWith('ext:')) {
        const url = decodeURIComponent(raw.slice(4));
        return { stack: [], channelId: null, viewMode: 'externalLink', externalUrl: url };
    }
    const [stackPart, channelId] = raw.split('|');
    const ids = stackPart ? stackPart.split(',').filter(Boolean) : [];
    const validStack = [];
    ids.forEach((id, index) => {
        if (!categoriesCache[id]) return;
        if (index === 0 || categoriesCache[id].parentId === validStack[index - 1]) {
            validStack.push(id);
        }
    });
    return { stack: validStack, channelId: channelId || null, viewMode: 'home', externalUrl: '' };
}

function getDescendants(rootId) {
    const ids = [rootId];
    for (let i = 0; i < ids.length; i++) {
        Object.values(categoriesCache).forEach(c => {
            if (c.parentId === ids[i] && !ids.includes(c.id)) ids.push(c.id);
        });
    }
    return ids;
}

function getChannelCategoryIds(channel) {
    if (!channel) return [];
    let ids = [];
    if (channel.categoryIds) {
        ids = Array.isArray(channel.categoryIds) ? channel.categoryIds : Object.values(channel.categoryIds);
    } else if (channel.categories) {
        ids = Array.isArray(channel.categories) ? channel.categories : Object.values(channel.categories);
    } else if (channel.categoryId) {
        ids = [channel.categoryId];
    } else if (channel.catId) {
        ids = [channel.catId];
    }
    return ids.map(id => String(id)).filter(id => id && id !== 'undefined');
}

function parseChannelLinks(ch) {
    const links = [];
    if (ch.links && typeof ch.links === 'object') {
        Object.keys(ch.links).forEach(key => {
            const entry = ch.links[key];
            if (entry && entry.url) {
                links.push({ label: entry.label || key, url: entry.url });
            } else if (typeof entry === 'string') {
                links.push({ label: key, url: entry });
            }
        });
    }
    ['mainLink', 'hdLink', 'sdLink', 'backupLink', 'url', 'stream', 'src', 'play', 'link', 'video', 'm3u8', 'mp4'].forEach(prop => {
        if (ch[prop] && typeof ch[prop] === 'string' && !links.some(l => l.url === ch[prop])) {
            links.push({ label: prop, url: ch[prop] });
        }
    });
    if (ch.url && typeof ch.url === 'string' && !links.some(l => l.url === ch.url)) {
        links.push({ label: 'الرئيسي', url: ch.url });
    }
    const priority = ['الرئيسي', 'main', 'auto', 'Auto', 'AUTO'];
    links.sort((a, b) => {
        const aIndex = priority.findIndex(label => a.label.includes(label));
        const bIndex = priority.findIndex(label => b.label.includes(label));
        if (aIndex === -1 && bIndex === -1) return 0;
        if (aIndex === -1) return 1;
        if (bIndex === -1) return -1;
        return aIndex - bIndex;
    });
    return links;
}

function showQualityButtons() {

}

function updateQualityMenu() {
    const list = $('qualityOptionList');
    if (!list) return;
    list.classList.add('hidden');
    if ((currentQualityMode !== 'hls' && currentQualityMode !== 'links') || !currentQualitySources || currentQualitySources.length <= 1) {
        list.innerHTML = '';
        return;
    }
    list.innerHTML = '';
    currentQualitySources.forEach((source, idx) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'quality-option-item' + (idx === currentQualityIndex ? ' active' : '');
        btn.textContent = source.label || `الجودة ${idx + 1}`;
        btn.onclick = (e) => {
            e.stopPropagation();
            currentQualityIndex = idx;
            if (currentQualityMode === 'links') {
                currentLinkIndex = idx;
                setPlayerSource(source.url);
            } else if (currentQualityMode === 'hls') {
                currentQualitySources.forEach((item, i) => {
                    if (item.rep && typeof item.rep.enabled === 'function') {
                        item.rep.enabled(i === idx);
                    }
                });
            }
            document.querySelectorAll('.quality-option-item').forEach((item, i) => item.classList.toggle('active', i === idx));
            closeQualityMenu();
        };
        list.appendChild(btn);
    });
}

function toggleQualityMenu(event) {
    if (event) event.stopPropagation();
    const list = $('qualityOptionList');
    if (list) list.classList.toggle('hidden');
}

function closeQualityMenu() {
    const list = $('qualityOptionList');
    if (list) list.classList.add('hidden');
}

document.addEventListener('click', closeQualityMenu);

function getHlsRepresentations(player) {
    const tech = player.tech({ IWillNotUseThisInPlugins: true });
    if (!tech || !tech.vhs) return [];
    if (typeof tech.vhs.representations === 'function') {
        return tech.vhs.representations().map(rep => ({
            label: rep.height ? `${rep.height}p` : rep.bandwidth ? `${Math.round(rep.bandwidth/1000)}kbps` : 'Unknown',
            rep
        }));
    }
    const master = tech.vhs.playlists && tech.vhs.playlists.master;
    if (!master || !Array.isArray(master.playlists)) return [];
    return master.playlists.map((playlist, index) => ({
        label: playlist.attributes.RESOLUTION ? `${playlist.attributes.RESOLUTION.height}p` : `جودة ${index + 1}`,
        playlist
    }));
}

function detectHlsQualities(player) {
    const reps = getHlsRepresentations(player);
    if (reps.length <= 1) return;
    currentQualityMode = 'hls';
    currentQualitySources = reps;
    currentQualityIndex = 0;
    updateQualityMenu();
    showQualityButtons();
}

function setupQualityButtons(links, mode = 'links') {
    const container = $('qualityButtons');
    if (container) container.innerHTML = '';
    currentQualityMode = mode;
    currentQualitySources = links;
    if (mode === 'links' && links.length > 1) {
        links.forEach((link, idx) => {
            const btn = document.createElement('button');
            btn.className = 'quality-button' + (idx === 0 ? ' active' : '');
            btn.textContent = link.label;
            btn.onclick = (e) => {
                e.stopPropagation();
                currentQualityIndex = idx;
                currentLinkIndex = idx;
                document.querySelectorAll('.quality-button').forEach((b, i) => b.classList.toggle('active', i === idx));
                setPlayerSource(link.url);
                updateQualityMenu();
            };
            if (container) container.appendChild(btn);
        });
    }
    updateQualityMenu();
    showQualityButtons();
}

function cleanupNativePlayer() {
    const nativeEl = $('native-video');
    if (nativePlayerInstance && typeof nativePlayerInstance.destroy === 'function') nativePlayerInstance.destroy();
    nativePlayerInstance = null;
    if (nativeEl) {
        nativeEl.pause();
        nativeEl.src = '';
        nativeEl.classList.add('hidden');
    }
}

function cleanupPlayerJS() {
    const playerjsEl = $('playerjs-container');
    if (playerjsEngineInstance && typeof playerjsEngineInstance.destroy === 'function') playerjsEngineInstance.destroy();
    playerjsEngineInstance = null;
    if (playerjsEl) {
        playerjsEl.innerHTML = '';
        playerjsEl.classList.add('hidden');
    }
}

function initializePlayerJS(url) {
    const playerjsEl = $('playerjs-container');
    if (!playerjsEl) {
        setPlayerSource(url, 'native', false);
        return;
    }
    if (typeof window.Playerjs === 'undefined') {
        if (!attemptedFallbacks.native) {
            attemptedFallbacks.native = true;
            setPlayerSource(url, 'native', false);
            return;
        }
        if (!attemptedFallbacks.videojs) {
            attemptedFallbacks.videojs = true;
            setPlayerSource(url, 'videojs', false);
            return;
        }
        fallbackToNextLink();
        return;
    }
    cleanupPlayerJS();
    showActivePlayer('playerjs');
    playerjsEngineInstance = new Playerjs({ id: 'playerjs-container', file: url, autoplay: true });
    if (playerjsEngineInstance && typeof playerjsEngineInstance.on === 'function') {
        playerjsEngineInstance.on('error', () => {
            if (!attemptedFallbacks.native) {
                attemptedFallbacks.native = true;
                setPlayerSource(url, 'native', false);
                return;
            }
            if (!attemptedFallbacks.videojs) {
                attemptedFallbacks.videojs = true;
                setPlayerSource(url, 'videojs', false);
                return;
            }
            fallbackToNextLink();
        });
    }
}

function showActivePlayer(engine) {
    cleanupAllPlayers();
    let id = '';
    switch(engine) {
        case 'videojs': case 'hlsjs': case 'flvjs': id = 'video-player'; break;
        case 'shaka': id = 'shaka-video'; break;
        case 'dashjs': id = 'dashjs-video'; break;
        case 'clappr': id = 'clappr-container'; break;
        case 'plyr': id = 'plyr-video'; break;
        case 'dplayer': id = 'dplayer-container'; break;
        case 'mediaelement': id = 'mediaelement-video'; break;
        case 'openplayer': id = 'openplayer-container'; break;
        case 'mediachrome': id = 'mediachrome-container'; break;
        case 'playerjs': id = 'playerjs-container'; break;
        case 'native': id = 'native-video'; break;
    }
    if (id && $(id)) $(id).classList.remove('hidden');
}

function initializeNativePlayer(url) {
    const nativeEl = $('native-video');
    if (!nativeEl) return;
    cleanupNativePlayer();
    showActivePlayer('native');
    nativeEl.controls = true;
    nativeEl.autoplay = true;
    nativeEl.playsInline = true;
    nativeEl.removeAttribute('src');
    nativeEl.load();
    if (url.includes('m3u8') && window.Hls && Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(nativeEl);
        nativePlayerInstance = hls;
    } else {
        nativeEl.src = url;
        nativePlayerInstance = nativeEl;
    }
    nativeEl.onloadedmetadata = () => nativeEl.play().catch(() => {});
    if (url.includes('m3u8') && window.Hls && Hls.isSupported()) {
        const hls = nativePlayerInstance;
        hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
                hls.destroy();
                fallbackToNextEngine(url);
            }
        });
    }
    nativeEl.onerror = () => {
        fallbackToNextEngine(url);
    };
}

function setPlayerSource(url, engine = 'videojs', resetFallbacks = true) {
    if (!url) return;
    
    // في المحاولات المتوازاة، تخطي إذا كان هناك مشغل نجح بالفعل
    if (!resetFallbacks && parallelEngineSuccessful) return;
    
    currentPlayerEngine = engine;
    if (resetFallbacks) {
        Object.keys(attemptedFallbacks).forEach(k => attemptedFallbacks[k] = false);
        parallelEngineSuccessful = false;
    }
    attemptedFallbacks[engine] = true;
    showActivePlayer(engine);

    const engineSelect = $('playerEngineSelect');
    if (engineSelect) {
        if (resetFallbacks) {
            engineSelect.value = 'auto';
        } else {
            engineSelect.value = engine;
        }
    }

    try {
        switch(engine) {
            case 'videojs':
                videojsInstance = videojs('video-player', { autoplay: true, controls: true, responsive: true, fluid: false, preload: 'auto', muted: false });
                videojsInstance.src({ src: url, type: url.includes('m3u8') ? 'application/x-mpegURL' : 'video/mp4' });
                videojsInstance.ready(function() {
                    // تحديد النجاح عند بدء التشغيل
                    if (!resetFallbacks) parallelEngineSuccessful = true;
                    this.play().catch(e => console.error("Autoplay failed:", e));
                });
                videojsInstance.on('error', () => fallbackToNextEngine(url));
                break;
            case 'hlsjs':
                if (Hls.isSupported()) {
                    hlsjsInstance = new Hls();
                    hlsjsInstance.loadSource(url);
                    const v = $('video-player');
                    hlsjsInstance.attachMedia(v);
                    hlsjsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        v.play().catch(e => console.error("HLS Autoplay failed:", e));
                    });
                    hlsjsInstance.on(Hls.Events.ERROR, (e, data) => { if (data.fatal) fallbackToNextEngine(url); });
                } else fallbackToNextEngine(url);
                break;
            case 'shaka':
                const sv = $('shaka-video');
                shakaPlayerInstance = new shaka.Player(sv);
                shakaPlayerInstance.load(url).then(() => {
                    sv.play().catch(e => console.error("Shaka Autoplay failed:", e));
                }).catch(() => fallbackToNextEngine(url));
                shakaPlayerInstance.addEventListener('error', () => fallbackToNextEngine(url));
                break;
            case 'dashjs':
                const dv = $('dashjs-video');
                dashjsInstance = dashjs.MediaPlayer().create();
                dashjsInstance.initialize(dv, url, true);
                dv.play().catch(e => console.error("DASH Autoplay failed:", e));
                dashjsInstance.on('error', () => fallbackToNextEngine(url));
                break;
            case 'clappr':
                clapprInstance = new Clappr.Player({ source: url, parentId: '#clappr-container', autoPlay: true, mute: false });
                clapprInstance.on(Clappr.Events.PLAYER_READY, () => {
                    const cv = document.querySelector('#clappr-container video');
                    if (cv) cv.play().catch(e => console.error("Clappr Autoplay failed:", e));
                });
                clapprInstance.on(Clappr.Events.PLAYER_ERROR, () => fallbackToNextEngine(url));
                break;
            case 'plyr':
                const pv = $('plyr-video');
                plyrInstance = new Plyr(pv, { autoplay: true });
                pv.src = url;
                pv.play().catch(e => console.error("Plyr Autoplay failed:", e));
                pv.onerror = () => fallbackToNextEngine(url);
                break;
            case 'dplayer':
                dplayerInstance = new DPlayer({ container: $('dplayer-container'), video: { url: url, type: url.includes('m3u8') ? 'hls' : 'auto' }, autoplay: true });
                dplayerInstance.play();
                dplayerInstance.on('error', () => fallbackToNextEngine(url));
                break;
            case 'mediaelement':
                mediaelementInstance = new MediaElementPlayer('mediaelement-video', { 
                    success: (me) => { 
                        me.setSrc(url); 
                        me.play().catch(e => console.error("MediaElement Autoplay failed:", e));
                        me.addEventListener('error', () => fallbackToNextEngine(url));
                    },
                    error: () => fallbackToNextEngine(url)
                });
                break;
            case 'openplayer':
                openplayerInstance = new OpenPlayerJS('openplayer-container');
                openplayerInstance.init();
                openplayerInstance.src = { src: url, type: 'application/x-mpegURL' };
                const ov = document.querySelector('#openplayer-container video');
                if (ov) {
                    ov.play().catch(e => console.error("OpenPlayer Autoplay failed:", e));
                    ov.onerror = () => fallbackToNextEngine(url);
                }
                break;
            case 'mediachrome':
                const mv = $('mediachrome-video');
                mv.src = url;
                mv.play().catch(e => console.error("MediaChrome Autoplay failed:", e));
                mv.onerror = () => fallbackToNextEngine(url);
                break;
            case 'flvjs':
                if (flvjs.isSupported()) {
                    const fv = $('video-player');
                    flvjsInstance = flvjs.createPlayer({ type: 'flv', url: url });
                    flvjsInstance.attachMediaElement(fv);
                    flvjsInstance.load();
                    flvjsInstance.play().catch(e => console.error("FLV Autoplay failed:", e));
                    flvjsInstance.on(flvjs.Events.ERROR, () => fallbackToNextEngine(url));
                } else fallbackToNextEngine(url);
                break;
            case 'jwplayer':
                if (typeof jwplayer !== 'undefined') {
                    jwplayerInstance = jwplayer('jwplayer-container').setup({
                        file: url,
                        autostart: true,
                        mute: false,
                        width: '100%',
                        height: '100%'
                    });
                    jwplayerInstance.on('error', () => fallbackToNextEngine(url));
                    jwplayerInstance.on('setupError', () => fallbackToNextEngine(url));
                } else fallbackToNextEngine(url);
                break;
            case 'flowplayer':
                if (typeof flowplayer !== 'undefined') {
                    flowplayerInstance = flowplayer('#flowplayer-container', {
                        clip: { sources: [{ type: 'application/x-mpegurl', src: url }] },
                        autoplay: true
                    });
                    flowplayerInstance.on('error', () => fallbackToNextEngine(url));
                } else fallbackToNextEngine(url);
                break;
            case 'playerjs':
                initializePlayerJS(url);
                break;
            case 'native':
                initializeNativePlayer(url);
                break;
        }
    } catch(e) {
        console.error(`Error in engine ${engine}:`, e);
        fallbackToNextEngine(url);
    }
}

function hidePlayer() {
    cleanupAllPlayers();
    $('playerContainer').classList.add('hidden');
    const errorMsg = $('player-error-msg');
    if (errorMsg) errorMsg.classList.add('hidden');
    document.body.classList.remove('player-open');

    }

}

async function selectChannel(channel, pushHistory = true) {
    const links = parseChannelLinks(channel);
    if (!links.length) {
        if ($('grid')) $('grid').innerHTML = '<div class="card message-card">لا يوجد رابط بث صالح لهذه القناة</div>';
        return;
    }
    currentChannelId = channel.id;
    currentChannelLinks = links;
    currentLinkIndex = 0;
    currentQualityIndex = 0;
    currentQualityMode = 'links';
    setupQualityButtons(links, 'links');
    showPlayer(pushHistory);
    
    // تجربة مشغلات متعددة بشكل موازاة بدلاً من التسلسلي (5 مشغلات بدلاً من 3)
    tryEnginesInParallel(links[0].url, 5);
}

async function renderCurrentView() {
    const grid = $('grid');
    if (!grid) return; // تأكد من وجود العنصر
    const currentId = currentStack.length ? currentStack[currentStack.length - 1] : null;
    
    // حفظ موضع التمرير الحالي لتجنب القفز عند التحديث التلقائي
    const scrollPos = window.scrollY;
    
    grid.innerHTML = '';
    if (!currentId) {
        const roots = Object.values(categoriesCache).filter(c => !c.parentId);
        if (!roots.length) {
            grid.innerHTML = '<div class="empty-section-msg">لا توجد أقسام مضافة بعد</div>';
            return;
        }
        roots.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${cat.img || DEFAULT_IMAGE}" onerror="this.src='${DEFAULT_IMAGE}'"><div class="card-title">${cat.name}</div>`;
            card.onclick = () => {
                if (cat.link) { window.currentViewMode = 'externalLink'; window.currentExternalUrl = cat.link; applyViewMode(); pushState(); return; }
                currentStack.push(cat.id); pushState(); renderCurrentView();
            };
            grid.appendChild(card);
        });
        window.scrollTo(0, scrollPos); // استعادة موضع التمرير
        return;
    }
    const subs = Object.values(categoriesCache).filter(c => c.parentId === currentId);
    subs.forEach(sub => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<img src="${sub.img || DEFAULT_IMAGE}" onerror="this.src='${DEFAULT_IMAGE}'"><div class="card-title">${sub.name}</div>`;
        card.onclick = () => {
            if (sub.link) { window.currentViewMode = 'externalLink'; window.currentExternalUrl = sub.link; applyViewMode(); pushState(); return; }
            currentStack.push(sub.id); pushState(); renderCurrentView();
        };
        grid.appendChild(card);
    });
    const channels = channelsCache.filter(ch => getChannelCategoryIds(ch).includes(currentId));
    if (!channels.length && !subs.length) {
        grid.innerHTML = '<div class="empty-section-msg">عذراً، لا توجد محتويات في هذا القسم حالياً</div>';
        return;
    }
    channels.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<img src="${ch.img || DEFAULT_IMAGE}" onerror="this.src='${DEFAULT_IMAGE}'"><div class="card-title">${ch.name}</div>`;
        card.onclick = () => selectChannel(ch);
        grid.appendChild(card);
    });
    window.scrollTo(0, scrollPos); // استعادة موضع التمرير
}

let playerControlsTimer = null;
function showPlayerControls() {
    const qButtons = $('qualityButtons');
    const qMenu = $('qualityMenu');
    if (qButtons) qButtons.classList.add('show');
    if (qMenu) qMenu.classList.add('show');

    if (playerControlsTimer) clearTimeout(playerControlsTimer);
    playerControlsTimer = setTimeout(() => {
        if (qButtons) qButtons.classList.remove('show');
        if (qMenu) qMenu.classList.remove('show');
    }, 3000);
}

function initVideoPlayer() {
    document.addEventListener('keydown', event => {
        if (event.key === 'Escape' && $('playerContainer') && !$('playerContainer').classList.contains('hidden')) window.history.back();
    });

    const playerContainer = $('playerContainer');
    if (playerContainer) {
        ['mousemove', 'touchstart', 'click'].forEach(evt => {
            playerContainer.addEventListener(evt, showPlayerControls);
        });
    }

    const engineSelect = $('playerEngineSelect');
    if (engineSelect) {
        engineSelect.addEventListener('change', () => {
            if (currentChannelLinks && currentChannelLinks.length > 0) {
                const engine = engineSelect.value;
                if (engine !== 'auto') {
                    // عند الاختيار اليدوي، نعيد من الرابط الأول
                    currentLinkIndex = 0;
                    currentQualityIndex = 0;
                    attemptedFallbacks[engine] = false; 
                    setTimeout(() => {
                        setPlayerSource(currentChannelLinks[0].url, engine, false);
                        setupQualityButtons(currentChannelLinks, 'links');
                    }, 150);
                } else {
                    // إذا اختار تلقائي، نعيد من الرابط الأول
                    currentLinkIndex = 0;
                    currentQualityIndex = 0;
                    Object.keys(attemptedFallbacks).forEach(k => attemptedFallbacks[k] = false);
                    setTimeout(() => {
                        setPlayerSource(currentChannelLinks[0].url, getPreferredPlayerEngine(currentChannelLinks[0].url), false);
                        setupQualityButtons(currentChannelLinks, 'links');
                    }, 150);
                }
            }
        });
    }
}

async function refreshCategoriesCache() {
    try {
        const catSnap = await database.ref('categories').once('value');
        const map = {};
        catSnap.forEach(c => { map[c.key] = { id: c.key, ...c.val(), parentId: c.val().parentId || '' }; });
        categoriesCache = map;
    } catch (error) { categoriesCache = {}; }
}

async function refreshChannelsCache() {
    try {
        const chanSnap = await database.ref('channels').once('value');
        const list = [];
        chanSnap.forEach(ch => { list.push({ id: ch.key, ...ch.val() }); });
        channelsCache = list;
    } catch (error) { channelsCache = []; }
}

async function init() {
    if (appInitialized) return;
    appInitialized = true;
    initVideoPlayer();
    currentStack = [];
    await Promise.all([refreshCategoriesCache(), refreshChannelsCache()]);
    const hashState = restoreHashState();
    currentStack = hashState.stack;
    currentChannelId = hashState.channelId;
    window.currentViewMode = hashState.viewMode;
    applyViewMode();
    await renderCurrentView();
    if (currentChannelId) {
        const channel = channelsCache.find(ch => ch.id === currentChannelId);
        if (channel) await selectChannel(channel, false);
    }
    database.ref('categories').on('value', (snapshot) => {
        const map = {};
        snapshot.forEach(c => { map[c.key] = { id: c.key, ...c.val(), parentId: c.val().parentId || '' }; });
        categoriesCache = map;
        renderCurrentView();
    });
    database.ref('channels').on('value', (snapshot) => {
        const list = [];
        snapshot.forEach(ch => { list.push({ id: ch.key, ...ch.val() }); });
        channelsCache = list;
        renderCurrentView();
    });
}

function openSidebar() { document.body.classList.add('sidebar-open'); }
function closeSidebar() { document.body.classList.remove('sidebar-open'); }

function hideLightbox() {
    const lightbox = $('lightbox-alert');
    if (lightbox) {
        lightbox.style.display = 'none';
        localStorage.setItem('lightboxHidden', 'true');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('lightboxHidden') === 'true') {
        const lightbox = $('lightbox-alert');
        if (lightbox) lightbox.style.display = 'none';
    }

    const qualityToggle = $('qualityToggle');
    if (qualityToggle) qualityToggle.addEventListener('click', toggleQualityMenu);
    const sidebarToggle = $('sidebarToggle');
    if (sidebarToggle) sidebarToggle.addEventListener('click', (event) => {
        event.stopPropagation();
        if (document.body.classList.contains('sidebar-open')) closeSidebar(); else openSidebar();
    });
    const sidebarOverlay = $('sidebarOverlay');
    if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);
    const installBtn = $('installBtn');
    window.addEventListener('beforeinstallprompt', (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        if (installBtn) installBtn.classList.remove('hidden');
    });
    if (installBtn) {
        installBtn.addEventListener('click', async () => {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            const choiceResult = await deferredInstallPrompt.userChoice;
            deferredInstallPrompt = null;
            installBtn.classList.add('hidden');
        });
    }
    if ('serviceWorker' in navigator) {
        const swCode = `
            const CACHE_NAME = 'alfaham-tv-cache-v1';
            const ASSETS = ['/', 'index.html', 'admin.html'];
            self.addEventListener('install', event => {
                event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)));
                self.skipWaiting();
            });
            self.addEventListener('activate', event => {
                event.waitUntil(caches.keys().then(keys => Promise.all(
                    keys.filter(key => key !== CACHE_NAME).map(key => caches.delete(key))
                )));
                self.clients.claim();
            });
            self.addEventListener('fetch', event => {
                if (event.request.method !== 'GET') return;
                event.respondWith(
                    caches.match(event.request).then(cachedResponse => {
                        if (cachedResponse) return cachedResponse;
                        return fetch(event.request).then(networkResponse => {
                            if (!networkResponse || networkResponse.status !== 200 || networkResponse.type !== 'basic') return networkResponse;
                            const responseClone = networkResponse.clone();
                            caches.open(CACHE_NAME).then(cache => cache.put(event.request, responseClone));
                            return networkResponse;
                        }).catch(() => caches.match('index.html'));
                    })
                );
            });
        `;
        const blob = new Blob([swCode], { type: 'text/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(err => console.warn('SW registration failed:', err));
    }
    const homeNav = $('homeNav');
    const matchesNav = $('matchesNav');
    const matchesTableBtn = $('matchesTableBtn');
    const internalPlayerBtn = $('internalPlayerBtn');
    const backToMatchesGrid = $('backToMatchesGrid');
    if (homeNav && matchesNav) {
        const goToHome = () => {
            window.currentViewMode = 'home'; window.currentExternalUrl = '';
            homeNav.classList.add('active'); matchesNav.classList.remove('active');
            if ($('grid')) $('grid').classList.remove('hidden');
            if ($('matchesGrid')) $('matchesGrid').classList.add('hidden');
            if ($('matchesTableContainer')) $('matchesTableContainer').classList.add('hidden');
            if ($('externalLinkContainer')) $('externalLinkContainer').classList.add('hidden');
            currentStack = []; currentChannelId = null; pushState(); renderCurrentView();
            if ($('playerContainer') && !$('playerContainer').classList.contains('hidden')) hidePlayer();
        };
        homeNav.addEventListener('click', goToHome);
        if (internalPlayerBtn) internalPlayerBtn.addEventListener('click', (e) => { e.preventDefault(); goToHome(); });
        matchesNav.addEventListener('click', () => {
            window.currentViewMode = 'matchesTable';
            window.currentExternalUrl = '';
            matchesNav.classList.add('active'); homeNav.classList.remove('active');
            if ($('grid')) $('grid').classList.add('hidden');
            if ($('matchesGrid')) $('matchesGrid').classList.add('hidden');
            if ($('matchesTableContainer')) $('matchesTableContainer').classList.remove('hidden');
            if ($('externalLinkContainer')) $('externalLinkContainer').classList.add('hidden');
            loadMatchesTable(true);
            pushState();
            if ($('playerContainer') && !$('playerContainer').classList.contains('hidden')) hidePlayer();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }
    const matchesTableContainer = $('matchesTableContainer');
    if (matchesTableContainer) {
        matchesTableContainer.addEventListener('click', function(e) {
            const target = e.target.closest('a');
            if (target && target.href) {
                const href = target.getAttribute('href');
                if (href.startsWith('go:') || href.includes('m3u8') || href.includes('intent:')) {
                    e.preventDefault();
                    if (href.includes('m3u8')) {
                        setPlayerSource(href);
                        showPlayer();
                    } else {
                        toast('جاري محاولة تشغيل الرابط في المشغل الداخلي...');
                        setPlayerSource(href);
                        showPlayer();
                    }
                }
            }
        }, true);
    }
    if (backToMatchesGrid) {
        backToMatchesGrid.addEventListener('click', () => {
            if ($('matchesGrid')) $('matchesGrid').classList.remove('hidden');
            if ($('matchesTableContainer')) $('matchesTableContainer').classList.add('hidden');
        });
    }
});

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();

// جدول المباريات الجديد - يعمل تلقائيًا ويتناسق مع الواجهة
function loadMatchesTable(forceReload = false) {
    const container = $('matchesTableContainer');
    if (!container) return;
    container.innerHTML = matchesPageHtml;
    
    // Update clock
    function updateClock() {
        const now = new Date();
        const clockEl = container.querySelector('#clock');
        if (clockEl) {
            clockEl.textContent = now.toLocaleTimeString('ar-SA', { hour12: false });
        }
    }
    updateClock();
    setInterval(updateClock, 1000);
}

function closeExternalLink() {
    window.currentViewMode = 'home';
    window.currentExternalUrl = '';
    if ($('externalLinkContainer')) $('externalLinkContainer').classList.add('hidden');
    if ($('grid')) $('grid').classList.remove('hidden');
    const homeNav = $('homeNav');
    const matchesNav = $('matchesNav');
    if (homeNav) homeNav.classList.add('active');
    if (matchesNav) matchesNav.classList.remove('active');
    if ($('externalLinkIframe')) $('externalLinkIframe').src = '';
    pushState();
}

function openMatchLink(url) {
    if (!url) return;
    window.currentExternalUrl = url;
    window.currentViewMode = 'externalLink';
    applyViewMode();
    pushState();
}
